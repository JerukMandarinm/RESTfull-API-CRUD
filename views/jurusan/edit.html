<h2 class="text-xl font-bold mb-4">Edit Jurusan</h2>
<form method="POST" action="/jurusan/update/{{id}}">
    <div class="mb-3">
        <label class="block mb-1">Nama Jurusan</label>
        <input name="nama_jurusan" value="{{nama_jurusan}}" class="border p-2 w-full rounded" required>
    </div>
    <button class="bg-green-500 text-white px-4 py-2 rounded">Update</button>
    <a href="/jurusan" class="ml-2 text-gray-600">Batal</a>
</form>
